<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen AI API 管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.25y.cn/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.25y.cn/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
    <style>
        .navbar-brand-image { height: 2rem; }
        .card-stats { transition: transform 0.2s; }
        .card-stats:hover { transform: translateY(-2px); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-online { background-color: #2fb344; }
        .status-offline { background-color: #d63939; }
        .log-entry { font-family: monospace; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="page">
        <!-- 侧边栏 -->
        <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <h1 class="navbar-brand navbar-brand-autodark">
                    <a href="#">
                        <i class="ti ti-brain navbar-brand-image"></i>
                        Qwen AI API
                    </a>
                </h1>
                <div class="collapse navbar-collapse" id="sidebar-menu">
                    <ul class="navbar-nav pt-lg-3">
                        <li class="nav-item">
                            <a class="nav-link active" href="#dashboard" data-tab="dashboard">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <i class="ti ti-dashboard"></i>
                                </span>
                                <span class="nav-link-title">仪表盘</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#proxy" data-tab="proxy">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <i class="ti ti-globe"></i>
                                </span>
                                <span class="nav-link-title">代理管理</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#models" data-tab="models">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <i class="ti ti-cpu"></i>
                                </span>
                                <span class="nav-link-title">模型管理</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#logs" data-tab="logs">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <i class="ti ti-file-text"></i>
                                </span>
                                <span class="nav-link-title">日志</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#settings" data-tab="settings">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <i class="ti ti-settings"></i>
                                </span>
                                <span class="nav-link-title">设置</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <div class="page-wrapper">
            <!-- 顶部导航 -->
            <div class="page-header d-print-none">
                <div class="container-xl">
                    <div class="row g-2 align-items-center">
                        <div class="col">
                            <h2 class="page-title" id="page-title">仪表盘</h2>
                        </div>
                        <div class="col-auto ms-auto d-print-none">
                            <div class="btn-list">
                                <span class="d-none d-sm-inline">
                                    <span class="status-dot status-online me-2" id="server-status"></span>
                                    <span id="server-status-text">运行中</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 页面内容 -->
            <div class="page-body">
                <div class="container-xl">
                    <!-- 仪表盘 -->
                    <div id="tab-dashboard" class="tab-content active">
                        <div class="row row-deck row-cards">
                            <div class="col-sm-6 col-lg-3">
                                <div class="card card-stats">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center">
                                            <div class="subheader">总请求数</div>
                                        </div>
                                        <div class="h1 mb-3" id="total-requests">-</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-3">
                                <div class="card card-stats">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center">
                                            <div class="subheader">活跃节点</div>
                                        </div>
                                        <div class="h1 mb-3" id="active-nodes">-</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-3">
                                <div class="card card-stats">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center">
                                            <div class="subheader">平均延迟</div>
                                        </div>
                                        <div class="h1 mb-3" id="avg-latency">-</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-3">
                                <div class="card card-stats">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center">
                                            <div class="subheader">成功率</div>
                                        </div>
                                        <div class="h1 mb-3" id="success-rate">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-lg-8">
                                <div class="card">
                                    <div class="card-header">
                                        <h3 class="card-title">请求趋势</h3>
                                    </div>
                                    <div class="card-body">
                                        <div id="request-chart" style="height: 300px;"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="card">
                                    <div class="card-header">
                                        <h3 class="card-title">系统状态</h3>
                                    </div>
                                    <div class="card-body">
                                        <div class="list-group list-group-flush">
                                            <div class="list-group-item">
                                                <div class="row align-items-center">
                                                    <div class="col-auto">
                                                        <span class="status-dot status-online"></span>
                                                    </div>
                                                    <div class="col">API 服务</div>
                                                </div>
                                            </div>
                                            <div class="list-group-item">
                                                <div class="row align-items-center">
                                                    <div class="col-auto">
                                                        <span class="status-dot" id="proxy-status-dot"></span>
                                                    </div>
                                                    <div class="col">代理池</div>
                                                </div>
                                            </div>
                                            <div class="list-group-item">
                                                <div class="row align-items-center">
                                                    <div class="col-auto">
                                                        <span class="status-dot status-online"></span>
                                                    </div>
                                                    <div class="col">数据库</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 代理管理 -->
                    <div id="tab-proxy" class="tab-content" style="display: none;">
                        <div class="row">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h3 class="card-title">代理节点</h3>
                                        <div class="card-actions">
                                            <button class="btn btn-primary" onclick="refreshProxy()">
                                                <i class="ti ti-refresh me-2"></i>刷新订阅
                                            </button>
                                            <button class="btn btn-success" onclick="testAllNodes()">
                                                <i class="ti ti-activity me-2"></i>测试所有节点
                                            </button>
                                        </div>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-vcenter card-table">
                                                <thead>
                                                    <tr>
                                                        <th>节点名称</th>
                                                        <th>地址</th>
                                                        <th>延迟</th>
                                                        <th>状态</th>
                                                        <th>成功率</th>
                                                        <th>操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="proxy-nodes-table">
                                                    <tr>
                                                        <td colspan="6" class="text-center">加载中...</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 模型管理 -->
                    <div id="tab-models" class="tab-content" style="display: none;">
                        <div class="row">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h3 class="card-title">可用模型</h3>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-vcenter card-table">
                                                <thead>
                                                    <tr>
                                                        <th>模型 ID</th>
                                                        <th>描述</th>
                                                        <th>状态</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="models-table">
                                                    <tr>
                                                        <td colspan="3" class="text-center">加载中...</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 日志 -->
                    <div id="tab-logs" class="tab-content" style="display: none;">
                        <div class="row">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h3 class="card-title">系统日志</h3>
                                        <div class="card-actions">
                                            <button class="btn btn-secondary" onclick="clearLogs()">
                                                <i class="ti ti-trash me-2"></i>清空
                                            </button>
                                        </div>
                                    </div>
                                    <div class="card-body">
                                        <div class="log-container" style="max-height: 500px; overflow-y: auto;">
                                            <pre class="log-entry" id="logs-content">暂无日志...</pre>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 设置 -->
                    <div id="tab-settings" class="tab-content" style="display: none;">
                        <div class="row">
                            <div class="col-lg-8">
                                <div class="card">
                                    <div class="card-header">
                                        <h3 class="card-title">系统设置</h3>
                                    </div>
                                    <div class="card-body">
                                        <form id="settings-form">
                                            <div class="mb-3">
                                                <label class="form-label">服务端口</label>
                                                <input type="number" class="form-control" name="port" value="8000">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">调试模式</label>
                                                <select class="form-select" name="debug">
                                                    <option value="false">关闭</option>
                                                    <option value="true">开启</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">自动删除对话</label>
                                                <select class="form-select" name="auto_delete_chat">
                                                    <option value="false">关闭</option>
                                                    <option value="true">开启</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">启用代理</label>
                                                <select class="form-select" name="proxy_enabled">
                                                    <option value="false">关闭</option>
                                                    <option value="true">开启</option>
                                                </select>
                                                <small class="form-hint">开启后需要配置订阅URL才能使用代理功能</small>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">订阅 URL</label>
                                                <input type="text" class="form-control" name="subscription_url" placeholder="https://example.com/subscription">
                                                <small class="form-hint">多个订阅链接用逗号分隔</small>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">节点匹配规则</label>
                                                <input type="text" class="form-control" name="pattern" placeholder="CF优选-电信">
                                                <small class="form-hint">多个规则用逗号分隔</small>
                                            </div>
                                            <button type="submit" class="btn btn-primary">保存设置</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 页脚 -->
            <footer class="footer footer-transparent d-print-none">
                <div class="container-xl">
                    <div class="row text-center align-items-center flex-row-reverse">
                        <div class="col-lg-auto ms-lg-auto">
                            <ul class="list-inline list-inline-dots mb-0">
                                <li class="list-inline-item">
                                    <a href="https://github.com/your-repo/qwen-ai-reverse-api" class="link-secondary" target="_blank">
                                        <i class="ti ti-brand-github"></i> GitHub
                                    </a>
                                </li>
                            </ul>
                        </div>
                        <div class="col-12 col-lg-auto mt-3 mt-lg-0">
                            <ul class="list-inline list-inline-dots mb-0">
                                <li class="list-inline-item">
                                    Copyright &copy; 2026 Qwen AI Reverse API
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.25y.cn/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
    <script src="https://cdn.jsdelivr.25y.cn/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
    <script>
        // Tab 切换
        document.querySelectorAll('[data-tab]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const tab = link.dataset.tab;
                
                // 更新导航状态
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                // 切换内容
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(`tab-${tab}`).style.display = 'block';
                
                // 更新标题
                const titles = {
                    'dashboard': '仪表盘',
                    'proxy': '代理管理',
                    'models': '模型管理',
                    'logs': '日志',
                    'settings': '设置'
                };
                document.getElementById('page-title').textContent = titles[tab];
                
                // 加载数据
                if (tab === 'dashboard') loadDashboard();
                if (tab === 'proxy') loadProxyNodes();
                if (tab === 'models') loadModels();
                if (tab === 'settings') loadSettings();
            });
        });

        // 加载仪表盘数据
        async function loadDashboard() {
            try {
                // 获取请求统计
                const statsResponse = await fetch('/v1/admin/stats');
                const statsData = await statsResponse.json();
                
                // 更新统计数据
                document.getElementById('total-requests').textContent = statsData.total_requests || 0;
                document.getElementById('success-rate').textContent = (statsData.success_rate || 0) + '%';
                document.getElementById('active-nodes').textContent = statsData.available_nodes || 0;
                document.getElementById('avg-latency').textContent = (statsData.average_latency || 0).toFixed(0) + 'ms';
                
                // 更新代理状态
                const proxyStatus = document.getElementById('proxy-status-dot');
                if (statsData.available_nodes > 0) {
                    proxyStatus.classList.add('status-online');
                    proxyStatus.classList.remove('status-offline');
                } else {
                    proxyStatus.classList.add('status-offline');
                    proxyStatus.classList.remove('status-online');
                }
                
                // 更新图表
                updateChart(statsData.chart_labels || [], statsData.chart_data || []);
            } catch (e) {
                console.error('Failed to load dashboard:', e);
            }
        }
        
        // 更新图表
        function updateChart(labels, data) {
            const chartOptions = {
                series: [{
                    name: '请求数',
                    data: data
                }],
                chart: {
                    type: 'area',
                    height: 300,
                    toolbar: { show: false }
                },
                stroke: { curve: 'smooth' },
                xaxis: {
                    categories: labels
                },
                colors: ['#206bc4'],
                fill: {
                    type: 'gradient',
                    gradient: {
                        shadeIntensity: 1,
                        opacityFrom: 0.7,
                        opacityTo: 0.3
                    }
                }
            };
            
            if (requestChart) {
                requestChart.destroy();
            }
            
            requestChart = new ApexCharts(document.querySelector('#request-chart'), chartOptions);
            requestChart.render();
        }

        // 加载代理节点
        async function loadProxyNodes() {
            try {
                const response = await fetch('/v1/proxy/nodes');
                const data = await response.json();
                const nodes = data.nodes || [];
                
                const tbody = document.getElementById('proxy-nodes-table');
                if (nodes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">暂无节点</td></tr>';
                    return;
                }
                
                tbody.innerHTML = nodes.map(node => `
                    <tr>
                        <td>${node.name || 'Unknown'}</td>
                        <td>${node.address}:${node.port}</td>
                        <td>${node.average_latency ? node.average_latency.toFixed(0) + 'ms' : '-'}</td>
                        <td>
                            <span class="badge ${node.is_available ? 'bg-success' : 'bg-danger'}">
                                ${node.is_available ? '可用' : '不可用'}
                            </span>
                        </td>
                        <td>${node.success_count || 0}/${(node.success_count || 0) + (node.fail_count || 0)}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="testNode('${node.address}:${node.port}')">
                                <i class="ti ti-activity"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Failed to load proxy nodes:', e);
            }
        }

        // 加载模型列表
        async function loadModels() {
            try {
                const response = await fetch('/v1/models');
                const data = await response.json();
                
                const tbody = document.getElementById('models-table');
                tbody.innerHTML = data.data.map(model => `
                    <tr>
                        <td><code>${model.id}</code></td>
                        <td>${getModelDescription(model.id)}</td>
                        <td><span class="badge bg-success">可用</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Failed to load models:', e);
            }
        }

        function getModelDescription(modelId) {
            const descriptions = {
                'qwen3.6-plus': '最新旗舰模型',
                'qwen3.5-plus': '高性能模型',
                'qwen3.5-flash': '快速响应模型',
                'qwen3.5-max-2026-03-08': '最大上下文模型（预览版）',
                'qwen3-max': '最大参数模型',
                'qwen3-coder': '代码生成模型',
                'qwen2.5-max': '稳定版本模型'
            };
            return descriptions[modelId] || '标准模型';
        }

        // 刷新订阅
        async function refreshProxy() {
            try {
                const btn = document.querySelector('button[onclick="refreshProxy()"]');
                btn.disabled = true;
                btn.innerHTML = '<i class="ti ti-refresh me-2"></i>刷新中...';
                
                const response = await fetch('/v1/proxy/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ test_nodes: true })
                });
                
                const result = await response.json();
                alert(`刷新完成！获取 ${result.total} 个节点，可用 ${result.available} 个`);
                loadProxyNodes();
            } catch (e) {
                alert('刷新失败: ' + e.message);
            } finally {
                const btn = document.querySelector('button[onclick="refreshProxy()"]');
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-refresh me-2"></i>刷新订阅';
            }
        }

        // 测试所有节点
        async function testAllNodes() {
            try {
                const btn = document.querySelector('button[onclick="testAllNodes()"]');
                btn.disabled = true;
                btn.innerHTML = '<i class="ti ti-activity me-2"></i>测试中...';
                
                const response = await fetch('/v1/proxy/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pattern: '' })
                });
                
                const result = await response.json();
                alert(`测试完成！成功 ${result.success} 个，失败 ${result.failed} 个`);
                loadProxyNodes();
            } catch (e) {
                alert('测试失败: ' + e.message);
            } finally {
                const btn = document.querySelector('button[onclick="testAllNodes()"]');
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-activity me-2"></i>测试所有节点';
            }
        }

        // 测试单个节点
        async function testNode(nodeId) {
            // 实现单个节点测试
            console.log('Testing node:', nodeId);
        }

        // 清空日志
        function clearLogs() {
            document.getElementById('logs-content').textContent = '暂无日志...';
        }

        // 加载设置
        async function loadSettings() {
            try {
                console.log('[Settings] 正在加载配置...');
                const response = await fetch('/v1/admin/config');
                console.log('[Settings] 响应状态:', response.status);

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }

                const config = await response.json();
                console.log('[Settings] 获取到的配置:', config);

                // 填充表单
                const portInput = document.querySelector('input[name="port"]');
                const debugSelect = document.querySelector('select[name="debug"]');
                const autoDeleteSelect = document.querySelector('select[name="auto_delete_chat"]');
                const proxyEnabledSelect = document.querySelector('select[name="proxy_enabled"]');
                const subUrlInput = document.querySelector('input[name="subscription_url"]');
                const patternInput = document.querySelector('input[name="pattern"]');

                if (portInput) portInput.value = config.port || '8000';
                if (debugSelect) debugSelect.value = config.debug ? 'true' : 'false';
                if (autoDeleteSelect) autoDeleteSelect.value = config.auto_delete_chat ? 'true' : 'false';
                if (proxyEnabledSelect) proxyEnabledSelect.value = config.proxy_enabled ? 'true' : 'false';
                if (subUrlInput) subUrlInput.value = config.subscription_url || '';
                if (patternInput) patternInput.value = config.pattern || '';

                console.log('[Settings] 配置已加载到表单');
            } catch (e) {
                console.error('[Settings] 加载配置失败:', e);
                alert('加载配置失败: ' + e.message);
            }
        }

        // 保存设置
        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = '保存中...';

            const formData = {
                port: document.querySelector('input[name="port"]').value,
                debug: document.querySelector('select[name="debug"]').value === 'true',
                auto_delete_chat: document.querySelector('select[name="auto_delete_chat"]').value === 'true',
                proxy_enabled: document.querySelector('select[name="proxy_enabled"]').value === 'true',
                subscription_url: document.querySelector('input[name="subscription_url"]').value,
                pattern: document.querySelector('input[name="pattern"]').value
            };

            console.log('[Settings] 正在保存配置:', formData);

            try {
                const response = await fetch('/v1/admin/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                console.log('[Settings] 响应状态:', response.status);

                let result;
                const responseText = await response.text();
                console.log('[Settings] 响应内容:', responseText);

                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    throw new Error('服务器返回了无效的JSON: ' + responseText.substring(0, 200));
                }

                if (response.ok && result.success) {
                    alert('配置已保存！\n文件路径: ' + (result.file_path || '.env'));
                    console.log('[Settings] 保存成功:', result);
                } else {
                    const errorMsg = result.detail || result.message || '未知错误';
                    alert('保存失败: ' + errorMsg);
                    console.error('[Settings] 保存失败:', result);
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
                console.error('[Settings] 请求异常:', e);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // 图表实例
        let requestChart = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
        });
    </script>
</body>
</html>
